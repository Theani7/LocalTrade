name: localtrade_app
description: A modern, community-focused marketplace for Nepal.
version: 2.2.6+8

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  provider: ^6.1.1
  
  # Networking & Auth
  http: ^1.1.0
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.2.2
  
  # UI & Styling
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.9
  flutter_spinkit: ^5.2.0
  cached_network_image: ^3.3.0
  fl_chart: ^1.2.0
  
  # Utilities
  intl: ^0.20.2
  image_picker: ^1.2.2
  url_launcher: ^6.2.0
  
  # Firebase & Notifications
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0
  shimmer: ^3.0.0
  confetti: ^0.7.0
  multi_select_flutter: ^4.1.3
  http_parser: ^4.1.2
  share_plus: ^10.0.3
  package_info_plus: ^8.0.0
  path_provider: ^2.1.2
  open_filex: ^4.4.0
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
